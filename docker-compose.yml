# NextGIS Web Docker Compose
# Production-ready deployment with PostgreSQL/PostGIS

services:
  # PostgreSQL with PostGIS extension
  db:
    image: postgis/postgis:15-3.3
    container_name: nextgisweb-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextgisweb
      POSTGRES_USER: nextgisweb
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nextgisweb_secret_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextgisweb -d nextgisweb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextgisweb-network

  # NextGIS Web Application
  nextgisweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextgisweb-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database connection
      NGW_DATABASE_URL: postgresql://nextgisweb:${DB_PASSWORD:-nextgisweb_secret_password}@db:5432/nextgisweb
      # Application settings
      NGW_SECRET: ${NGW_SECRET:-your_secret_key_change_in_production}
      NGW_CACHE_DIR: /var/nextgisweb/cache
      NGW_DATA_DIR: /var/nextgisweb/data
      NGW_LOG_LEVEL: ${NGW_LOG_LEVEL:-INFO}
      # Optional: Sentry for error tracking
      # NGW_SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - nextgisweb_data:/var/nextgisweb
      - ./docker/config:/etc/nextgisweb:ro
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - nextgisweb-network
    command: >
      sh -c "nextgisweb-config initialize &&
             python3 -m waitress --host=0.0.0.0 --port=8080 nextgisweb:main"

  # Optional: Nginx reverse proxy (uncomment for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: nextgisweb-nginx
  #   restart: unless-stopped
  #   depends_on:
  #     - nextgisweb
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/nginx/ssl:/etc/nginx/ssl:ro
  #   networks:
  #     - nextgisweb-network

volumes:
  postgres_data:
    driver: local
  nextgisweb_data:
    driver: local

networks:
  nextgisweb-network:
    driver: bridge
