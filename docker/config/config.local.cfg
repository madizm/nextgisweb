# NextGIS Web Configuration

[core]
# Database connection
database.host = db
database.port = 5432
database.name = nextgisweb
database.user = nextgisweb
database.password = nextgisweb_secret_password

# Cache directory
cache.dir = /var/nextgisweb/cache

# Data directory  
data.dir = /var/nextgisweb/data

# Storage directory (required for file storage)
sdir = /var/nextgisweb/data

# Application secret key (required for sessions)
secret = your_secret_key_change_in_production

# Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log.level = INFO

# Server settings
pyramid.reload_templates = false
pyramid.debug_authorization = false
pyramid.debug_notfound = false
pyramid.debug_routematch = false
pyramid.default_locale_name = en
